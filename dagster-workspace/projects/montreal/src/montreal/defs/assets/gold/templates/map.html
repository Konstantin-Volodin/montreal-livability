<script>
(function () {
  var map = {{ map_name }};
  var hexLayer = {{ hex_layer_name }};
  var boundaryGroup = {{ boundary_group_name }};
  var colorStops = {{ color_stops|tojson }};
  var metricWeights = {{ metric_weights|tojson }};
  var allMetrics = Object.keys(metricWeights);
  var activeMetrics = ["livability"];

  // Highlight lookup from the embedded boundary layer; keys must match report.py's _key().
  var boundaryFeatures = {};
  boundaryGroup.eachLayer(function (geojson) {
    geojson.eachLayer(function (layer) {
      var name = String(layer.feature.properties.municipality);
      boundaryFeatures[name.normalize("NFKC").toLowerCase().trim()] = layer.feature;
    });
  });

  var highlightLayer = L.geoJSON(null, {
    style: {
      fill: true,
      fillColor: "#0f766e",
      fillOpacity: 0.12,
      color: "#0f766e",
      weight: 2.6,
      opacity: 0.95
    },
    interactive: false
  }).addTo(map);

  function colorForScore(value) {
    var score = Math.max(0, Math.min(100, Number(value) || 0));
    for (var i = 1; i < colorStops.length; i++) {
      if (score <= colorStops[i][0]) {
        var left = colorStops[i - 1];
        var right = colorStops[i];
        var ratio = (score - left[0]) / (right[0] - left[0]);
        var rgb = left[1].map(function (channel, index) {
          return Math.round(channel + ratio * (right[1][index] - channel));
        });
        return "rgb(" + rgb.join(",") + ")";
      }
    }
    return "rgb(" + colorStops[colorStops.length - 1][1].join(",") + ")";
  }

  function scoreForFeature(feature) {
    if (activeMetrics.length === allMetrics.length) {
      return feature.properties.livability;
    }
    var total = 0;
    var weightTotal = 0;
    activeMetrics.forEach(function (metric) {
      var score = Number(feature.properties[metric]);
      var weight = Number(metricWeights[metric]);
      if (!Number.isNaN(score) && weight > 0) {
        total += weight * score;
        weightTotal += weight;
      }
    });
    return weightTotal ? total / weightTotal : feature.properties.livability;
  }

  function setMetrics(metrics) {
    activeMetrics = Array.isArray(metrics) && metrics.length ? metrics : ["livability"];
    hexLayer.setStyle(function (feature) {
      var color = colorForScore(scoreForFeature(feature));
      return {
        fillColor: color,
        color: color,
        weight: 0,
        fillOpacity: 0.6,
        opacity: 0
      };
    });
  }

  function clearHighlight() {
    highlightLayer.clearLayers();
  }

  function setBoundariesVisible(visible) {
    if (visible && !map.hasLayer(boundaryGroup)) boundaryGroup.addTo(map);
    if (!visible && map.hasLayer(boundaryGroup)) map.removeLayer(boundaryGroup);
  }

  function highlightMunicipality(municipalityKey, options) {
    clearHighlight();
    options = options || {};
    var feature = boundaryFeatures[municipalityKey];
    if (!feature) return;
    var added = highlightLayer.addData(feature);
    if (highlightLayer.bringToFront) highlightLayer.bringToFront();
    if (options.fit && added.getBounds) {
      map.fitBounds(added.getBounds(), { padding: [24, 24], maxZoom: 12 });
    }
  }

  var handlers = {
    "set-map-metrics": function (data) { setMetrics(data.metrics); },
    "set-boundary-visibility": function (data) {
      setBoundariesVisible(Boolean(data.visible));
    },
    "highlight-municipality": function (data) {
      highlightMunicipality(data.municipalityKey, { fit: Boolean(data.fit) });
    },
    "clear-municipality-highlight": clearHighlight
  };

  window.addEventListener("message", function (event) {
    var data = event.data || {};
    if (handlers[data.type]) handlers[data.type](data);
  });
}());
</script>
